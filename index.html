<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鬥獸棋</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e0e00;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: 'Noto Serif TC', '宋體', 'SimSun', serif;
      color: #f0d8a0;
      padding-bottom: 24px;
    }

    h1 {
      font-size: 1.6rem;
      letter-spacing: 6px;
      padding: 14px 0 4px;
      color: #ffcc66;
      text-shadow: 0 0 12px rgba(255,160,0,0.5);
    }

    #app {
      width: 100%;
      max-width: 560px;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }

    /* ── Info bar ── */
    #info-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.50);
      border: 1px solid rgba(180,100,0,0.35);
      border-radius: 8px;
      padding: 8px 14px;
      min-height: 46px;
      gap: 8px;
    }

    #turn-indicator {
      font-size: 1.05rem;
      font-weight: bold;
      min-width: 72px;
    }
    #turn-indicator.red   { color: #ff6060; }
    #turn-indicator.black { color: #aaaaaa; }

    #status-msg {
      flex: 1;
      font-size: 0.82rem;
      color: #c8a060;
      text-align: center;
    }

    button {
      background: #5a2000;
      color: #f0d8a0;
      border: 1px solid #9a5010;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.88rem;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: background 0.15s;
    }
    button:hover { background: #7a3010; }
    button:active { background: #4a1800; }

    /* ── Canvas ── */
    #canvas-wrap {
      position: relative;
      width: 100%;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      cursor: pointer;
      border-radius: 3px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.85);
    }

    /* ── Captured pieces panel ── */
    #captured-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .cap-box {
      background: rgba(0,0,0,0.38);
      border: 1px solid rgba(140,80,0,0.3);
      border-radius: 6px;
      padding: 7px 10px;
      min-height: 42px;
    }
    .cap-box h4 {
      font-size: 0.75rem;
      margin-bottom: 3px;
      opacity: 0.75;
    }
    .cap-list {
      font-size: 0.9rem;
      letter-spacing: 3px;
      color: #d4a040;
      min-height: 22px;
      line-height: 1.5;
    }

    /* ── Rules open button ── */
    #rules-open-btn {
      font-size: 0.78rem;
      color: #c8a060;
      background: none;
      border: 1px solid rgba(180,120,0,0.35);
      border-radius: 5px;
      padding: 4px 10px;
      cursor: pointer;
      align-self: center;
    }
    #rules-open-btn:hover { background: rgba(180,80,0,0.15); }

    /* ── Rules overlay ── */
    #rules-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
    }
    #rules-overlay.hidden { display: none; }
    .rules-content {
      background: #2e1200;
      border: 1px solid rgba(180,100,0,0.5);
      border-radius: 12px;
      padding: 24px 28px;
      max-width: 460px;
      width: 100%;
      font-size: 0.85rem;
      line-height: 1.8;
      color: #d4bc80;
      max-height: 80vh;
      overflow-y: auto;
    }
    .rules-content h3 {
      color: #ffcc66;
      font-size: 1.1rem;
      text-align: center;
      margin-bottom: 12px;
      letter-spacing: 4px;
    }
    .rules-content h4 { color: #ffcc66; margin: 10px 0 4px; font-size: 0.88rem; }
    .rules-content ul { padding-left: 18px; }
    .rules-content li { margin-bottom: 3px; }
    #rules-back-btn { margin-top: 20px; padding: 8px 28px; font-size: 0.95rem; }

    /* ── Undo button ── */
    #undo-btn {
      font-size: 0.80rem;
      padding: 5px 11px;
    }
    /* Colours reflect whose move will be undone */
    #undo-btn.undo-red {
      background: #5c1212;
      border-color: #c03030;
      color: #ffaaaa;
    }
    #undo-btn.undo-red:hover:not(:disabled) { background: #7a1c1c; }
    #undo-btn.undo-black {
      background: #262626;
      border-color: #888888;
      color: #cccccc;
    }
    #undo-btn.undo-black:hover:not(:disabled) { background: #383838; }
    #undo-btn:disabled { opacity: 0.32; cursor: default; }
    #undo-btn:disabled:hover { background: inherit; }

    /* ── Win overlay ── */
    #win-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.80);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #win-overlay.hidden { display: none; }

    #win-box {
      background: #2e1200;
      border: 2px solid #cc6010;
      border-radius: 16px;
      padding: 36px 52px;
      text-align: center;
      box-shadow: 0 0 40px rgba(200,100,0,0.4);
    }
    #win-message {
      font-size: 1.9rem;
      font-weight: bold;
      margin-bottom: 8px;
    }
    #win-message.red   { color: #ff7070; }
    #win-message.black { color: #c0c0c0; }
    #win-reason {
      font-size: 0.9rem;
      color: #c8a060;
      margin-bottom: 24px;
    }

    /* ── Setup overlay ── */
    #setup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }
    #setup-overlay.hidden { display: none; }

    #setup-box {
      background: #2e1200;
      border: 2px solid #cc6010;
      border-radius: 16px;
      padding: 32px 40px;
      min-width: 280px;
      text-align: center;
      box-shadow: 0 0 40px rgba(200,100,0,0.4);
    }
    #setup-box h2 {
      font-size: 1.3rem;
      color: #ffcc66;
      letter-spacing: 4px;
      margin-bottom: 22px;
    }
    .setup-row {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin-bottom: 18px;
      gap: 6px;
    }
    .setup-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      color: #f0d8a0;
      user-select: none;
    }
    .setup-label input[type="checkbox"] {
      width: 15px;
      height: 15px;
      cursor: pointer;
      accent-color: #cc6010;
    }
    .setup-hint {
      font-size: 0.72rem;
      color: #987840;
      padding-left: 23px;
    }
    .clock-setting {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 23px;
    }
    .clock-setting span { font-size: 0.82rem; color: #c8a060; }
    #s-clock-mins, #s-clock-inc {
      background: #3e1800;
      color: #f0d8a0;
      border: 1px solid #9a5010;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 0.88rem;
      font-family: inherit;
      cursor: pointer;
    }
    #s-clock-mins:disabled, #s-clock-inc:disabled { opacity: 0.38; cursor: default; }
    #start-game-btn {
      margin-top: 8px;
      padding: 10px 32px;
      font-size: 1rem;
      letter-spacing: 2px;
    }
    #start-game-btn:disabled { opacity: 0.45; cursor: default; }

    /* ── Resign button ── */
    #resign-btn {
      font-size: 0.80rem;
      padding: 5px 11px;
      background: #1e1e1e;
      border-color: #555;
      color: #aaa;
    }
    #resign-btn:hover:not(:disabled) { background: #2e2e2e; border-color: #888; color: #ddd; }
    #resign-btn:disabled { opacity: 0.28; cursor: default; }

    /* ── Resign confirm overlay ── */
    #resign-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 250;
    }
    #resign-overlay.hidden { display: none; }
    #resign-box {
      background: #1c1000;
      border: 2px solid #555;
      border-radius: 14px;
      padding: 28px 40px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.7);
    }
    #resign-box p {
      font-size: 1.05rem;
      color: #f0d8a0;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }
    .resign-actions { display: flex; gap: 14px; justify-content: center; }
    #resign-confirm-btn {
      background: #5c1212;
      border-color: #c03030;
      color: #ffaaaa;
      padding: 7px 22px;
    }
    #resign-confirm-btn:hover { background: #7a1c1c; }

    /* ── Language toggle ── */
    #lang-btn {
      font-size: 0.78rem;
      color: #c8a060;
      background: none;
      border: 1px solid rgba(180,120,0,0.35);
      border-radius: 5px;
      padding: 4px 10px;
      cursor: pointer;
    }
    #lang-btn:hover { background: rgba(180,80,0,0.15); }

    /* ── Bottom bar (rules + lang) ── */
    #bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* ── Clock panel ── */
    #clock-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    #clock-panel.hidden { display: none; }
    .clock-box {
      background: rgba(0,0,0,0.40);
      border: 1px solid rgba(140,80,0,0.30);
      border-radius: 8px;
      padding: 7px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      transition: background 0.2s, border-color 0.2s;
    }
    .clock-box.active {
      background: rgba(80,40,0,0.55);
      border-color: rgba(200,120,0,0.65);
    }
    .clock-player { font-size: 0.70rem; letter-spacing: 2px; opacity: 0.70; }
    .clock-box.clock-red   .clock-player { color: #ff7070; }
    .clock-box.clock-black .clock-player { color: #aaaaaa; }
    .clock-time {
      font-size: 1.35rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
    }
    .clock-box.clock-red   .clock-time { color: #ff9090; }
    .clock-box.clock-black .clock-time { color: #c0c0c0; }
    .clock-time.urgent { color: #ff2020 !important; animation: urgentBlink 0.7s step-end infinite; }
    @keyframes urgentBlink { 50% { opacity: 0.25; } }
  </style>
</head>
<body>
  <h1 id="page-title">鬥獸棋</h1>

  <div id="app">
    <div id="info-bar">
      <span id="turn-indicator" class="red">紅方回合</span>
      <span id="status-msg"></span>
      <button id="undo-btn" disabled>悔棋</button>
      <button id="resign-btn" disabled>投降</button>
      <button id="new-game-btn">新對局</button>
    </div>

    <div id="clock-panel" class="hidden">
      <div class="clock-box clock-black" id="clock-box-black">
        <span class="clock-player" id="clock-black-label">黑方</span>
        <span class="clock-time" id="clock-black-time">10:00</span>
      </div>
      <div class="clock-box clock-red" id="clock-box-red">
        <span class="clock-player" id="clock-red-label">紅方</span>
        <span class="clock-time" id="clock-red-time">10:00</span>
      </div>
    </div>

    <div id="canvas-wrap">
      <canvas id="board"></canvas>
    </div>

    <div id="captured-panel">
      <div class="cap-box">
        <h4 id="cap-red-label" style="color:#ff8080">紅方吃子</h4>
        <div id="red-cap" class="cap-list">—</div>
      </div>
      <div class="cap-box">
        <h4 id="cap-black-label" style="color:#a0a0a0">黑方吃子</h4>
        <div id="black-cap" class="cap-list">—</div>
      </div>
    </div>

    <div id="bottom-bar">
      <button id="rules-open-btn">遊戲規則</button>
      <button id="lang-btn">EN</button>
    </div>
  </div>

  <div id="rules-overlay" class="hidden">
    <div class="rules-content"><!-- filled by applyLang() --></div>
  </div>

  <div id="resign-overlay" class="hidden">
    <div id="resign-box">
      <p id="resign-prompt">確認投降？</p>
      <div class="resign-actions">
        <button id="resign-confirm-btn">確認投降</button>
        <button id="resign-cancel-btn">取消</button>
      </div>
    </div>
  </div>

  <div id="setup-overlay">
    <div id="setup-box">
      <h2 id="setup-title">遊戲設定</h2>
      <div class="setup-row">
        <label class="setup-label">
          <input type="checkbox" id="s-undo" checked> <span id="s-undo-label">啟用悔棋</span>
        </label>
        <span id="s-undo-hint" class="setup-hint">每方每回合限悔一次</span>
      </div>
      <div class="setup-row">
        <label class="setup-label">
          <input type="checkbox" id="s-clock"> <span id="s-clock-label">啟用棋鐘</span>
        </label>
        <div class="clock-setting">
          <select id="s-clock-mins" disabled></select>
          <span id="s-min-per-label">分 / 方</span>
          <span id="s-inc-plus-label" style="margin-left:4px">＋</span>
          <select id="s-clock-inc" disabled></select>
          <span id="s-sec-per-label">秒 / 步</span>
        </div>
      </div>
      <button id="start-game-btn" disabled>載入中…</button>
    </div>
  </div>

  <div id="win-overlay" class="hidden">
    <div id="win-box">
      <div id="win-message"></div>
      <div id="win-reason"></div>
      <button id="restart-btn">重新開始</button>
    </div>
  </div>

<script>
'use strict';

// ═══════════════════════════════════════════════
//   BOARD CONSTANTS
// ═══════════════════════════════════════════════
const COLS = 7, ROWS = 9;

// Terrain codes
const LAND    = 0;
const WATER   = 1;
const TRAP_T  = 2;  // Trap in Black's home territory  (Red pieces here have rank 0)
const TRAP_B  = 3;  // Trap in Red's home territory   (Black pieces here have rank 0)
const DEN_T   = 4;  // Black's den (col 3, row 0)
const DEN_B   = 5;  // Red's den   (col 3, row 8)

// terrain[row][col]
const TERRAIN = [
  [LAND,  LAND,  TRAP_T, DEN_T,  TRAP_T, LAND,  LAND ],  // row 0
  [LAND,  LAND,  LAND,   TRAP_T, LAND,   LAND,  LAND ],  // row 1
  [LAND,  LAND,  LAND,   LAND,   LAND,   LAND,  LAND ],  // row 2
  [LAND,  WATER, WATER,  LAND,   WATER,  WATER, LAND ],  // row 3
  [LAND,  WATER, WATER,  LAND,   WATER,  WATER, LAND ],  // row 4
  [LAND,  WATER, WATER,  LAND,   WATER,  WATER, LAND ],  // row 5
  [LAND,  LAND,  LAND,   LAND,   LAND,   LAND,  LAND ],  // row 6
  [LAND,  LAND,  LAND,   TRAP_B, LAND,   LAND,  LAND ],  // row 7
  [LAND,  LAND,  TRAP_B, DEN_B,  TRAP_B, LAND,  LAND ],  // row 8
];

// ═══════════════════════════════════════════════
//   PIECE DEFINITIONS
// ═══════════════════════════════════════════════
const PIECE_DEF = {
  elephant: { rank: 8, name: '象', nameEn: 'Elephant' },
  lion:     { rank: 7, name: '獅', nameEn: 'Lion'     },
  tiger:    { rank: 6, name: '虎', nameEn: 'Tiger'    },
  leopard:  { rank: 5, name: '豹', nameEn: 'Leopard'  },
  wolf:     { rank: 4, name: '狼', nameEn: 'Wolf'     },
  dog:      { rank: 3, name: '狗', nameEn: 'Dog'      },
  cat:      { rank: 2, name: '貓', nameEn: 'Cat'      },
  rat:      { rank: 1, name: '鼠', nameEn: 'Rat'      },
};

// ═══════════════════════════════════════════════
//   LANGUAGE / I18N
// ═══════════════════════════════════════════════
let lang = 'zh'; // 'zh' | 'en'

const LANG = {
  zh: {
    title:          '鬥獸棋',
    turn_red:       '紅方回合',
    turn_black:     '黑方回合',
    undo_label:     '悔棋',
    undo_red:       '紅方悔棋',
    undo_black:     '黑方悔棋',
    undo_tip:       (s) => `撤銷${s === 'red' ? '紅方' : '黑方'}剛才的一步`,
    undo_tip_used:  '每輪僅限悔棋一次',
    resign_btn:     '投降',
    new_game:       '新對局',

    cap_red:        '紅方吃子',
    cap_black:      '黑方吃子',
    rules_btn:      '遊戲規則',
    resign_confirm: '確認投降',
    resign_cancel:  '取消',
    resign_prompt:  (s) => `${s === 'red' ? '紅方' : '黑方'}確認投降？`,
    setup_title:    '遊戲設定',
    setup_undo:     '啟用悔棋',
    setup_undo_hint:'每方每回合限悔一次',
    setup_clock:    '啟用棋鐘',
    setup_min_per:  '分 / 方',
    setup_inc_plus: '＋',
    setup_sec_per:  '秒 / 步',
    setup_loading:  '載入中…',
    setup_start:    '開始遊戲',
    restart:        '重新開始',
    win:            (s) => s === 'red' ? '紅方勝！' : '黑方勝！',
    win_class_red:  '紅方勝！',
    reason_den:     '闖入對方獸穴',
    reason_captures:'殲滅對方所有棋子',
    reason_timeout: (s) => `${s === 'red' ? '紅方' : '黑方'}超時`,
    reason_resign:  (s) => `${s === 'red' ? '紅方' : '黑方'}投降`,
    no_moves:       (n) => `${n} 無路可走`,
    lang_toggle:    'EN',
    rules_html: `<h3>遊戲規則</h3>
      <h4>棋子等級（大→小）</h4>
      <p>象(8) &gt; 獅(7) &gt; 虎(6) &gt; 豹(5) &gt; 狼(4) &gt; 狗(3) &gt; 貓(2) &gt; 鼠(1)</p>
      <h4 style="margin-top:8px">特殊規則</h4>
      <ul>
        <li>鼠 可吃 象；象 不可吃 鼠</li>
        <li>鼠 可游入河中；在水中的鼠 不可吃 陸上的象</li>
        <li>獅、虎 可跳越整條河（直跳或橫跳）；河中有鼠則不能越河</li>
        <li>棋子進入對方陷阱後，任何棋子均可將其吃掉</li>
        <li>率先進入對方獸穴，或吃光對方所有棋子，即勝</li>
        <li>不可進入己方獸穴</li>
        <li>紅方先行</li>
      </ul>
      <div style="text-align:center">
        <button id="rules-back-btn">回到遊戲</button>
      </div>`,
  },
  en: {
    title:          'Jungle Chess',

    cap_black:      'Black Captures',
    rules_btn:      'Rules',

    resign_cancel:  'Cancel',
    resign_prompt:  (s) => `${s === 'red' ? 'Red' : 'Black'} resigns?`,
    setup_title:    'Game Settings',
    setup_undo:     'Allow Take-back',

    setup_clock:    'Chess Clock',
    setup_min_per:  'min / side',
    setup_inc_plus: '+',
    setup_sec_per:  'sec / move',
    setup_loading:  'Loading\u2026',
    setup_start:    'Start Game',
    restart:        'Play Again',
    win:            (s) => s === 'red' ? 'Red Wins!' : 'Black Wins!',
    reason_den:     "Entered opponent's den",
    reason_captures:'All enemy pieces captured',
    reason_timeout: (s) => `${s === 'red' ? 'Red' : 'Black'} timeout`,
    reason_resign:  (s) => `${s === 'red' ? 'Red' : 'Black'} resigned`,
    no_moves:       (n) => `${n} has no moves`,
    lang_toggle:    '中文',
    rules_html: `<h3>Game Rules</h3>
      <h4>Piece Ranks (Strong \u2192 Weak)</h4>
      <p>Elephant(8) &gt; Lion(7) &gt; Tiger(6) &gt; Leopard(5) &gt; Wolf(4) &gt; Dog(3) &gt; Cat(2) &gt; Rat(1)</p>
      <h4 style="margin-top:8px">Special Rules</h4>
      <ul>
        <li>Rat can capture Elephant; Elephant cannot capture Rat</li>
        <li>Rat can swim in rivers; a Rat in water cannot capture a land Elephant</li>
        <li>Lion &amp; Tiger may leap over entire rivers; blocked if a Rat is in the river</li>
        <li>Any piece in an enemy trap loses its rank and can be captured by any piece</li>
        <li>Win by entering the opponent's den, or by capturing all enemy pieces</li>
        <li>Cannot enter your own den</li>
        <li>Red moves first</li>
      </ul>
      <div style="text-align:center">
        <button id="rules-back-btn">Back to Game</button>
      </div>`,
  },
};

function T(key, arg) {
  const val = LANG[lang][key];
  return typeof val === 'function' ? val(arg) : (val ?? key);
}

function pieceName(type) {
  return lang === 'zh' ? PIECE_DEF[type].name : PIECE_DEF[type].nameEn;
}

// Sprite position in pieces.png — no longer needed (individual assets used)
// kept as reference only
/*
const SPRITE_POS = {
  elephant: [0, 0], tiger: [1, 0], cat: [2, 0], wolf: [3, 0],
  dog: [0, 1], rat: [1, 1], leopard: [2, 1], lion: [3, 1],
};
*/

// Initial positions  [col, row, player, type]
const INIT_POS = [
  // Black (top side — pieces face downward on the board image)
  [0, 0, 'black', 'lion'],
  [6, 0, 'black', 'tiger'],
  [1, 1, 'black', 'dog'],
  [5, 1, 'black', 'cat'],
  [0, 2, 'black', 'rat'],
  [2, 2, 'black', 'leopard'],
  [4, 2, 'black', 'wolf'],
  [6, 2, 'black', 'elephant'],
  // Red (bottom side — moves first)
  [0, 6, 'red', 'elephant'],
  [2, 6, 'red', 'wolf'],
  [4, 6, 'red', 'leopard'],
  [6, 6, 'red', 'rat'],
  [1, 7, 'red', 'cat'],
  [5, 7, 'red', 'dog'],
  [0, 8, 'red', 'tiger'],
  [6, 8, 'red', 'lion'],
];

// ═══════════════════════════════════════════════
//   SETTINGS (locked once a game starts)
// ═══════════════════════════════════════════════
const settings = { undoEnabled: true, clockEnabled: false, clockMinutes: 10, clockIncrement: 0 };
let imagesReady = false;

// ═══════════════════════════════════════════════
//   GAME STATE
// ═══════════════════════════════════════════════
let board = [];           // board[row][col] = {player, type} | null
let currentPlayer = 'red';
let selectedCell  = null; // {col, row} | null
let validMoves    = [];   // [{col, row}, ...]
let gameOver      = false;
let capturedByRed   = []; // types of pieces Red captured
let capturedByBlack = []; // types of pieces Black captured
let lastMove      = null; // {from:{col,row}, to:{col,row}} for visual hint

// Undo state
let lastSnapshot      = null;  // game state before the most recent move
let undoUsedThisRound = false; // undo was used; resets only after opponent's next move
let postUndoMove      = false; // marks the recovery move after an undo

// Clock state
let clockRed      = 0;   // remaining seconds for red
let clockBlack    = 0;   // remaining seconds for black
let clockInterval = null;

// Animation state (for pulsing capture highlights)
let animFrame = null;
let animPhase = 0;

// ═══════════════════════════════════════════════
//   UNDO HELPERS
// ═══════════════════════════════════════════════
function saveSnapshot() {
  return {
    board:          board.map(row => row.map(cell => cell ? { ...cell } : null)),
    currentPlayer,
    capturedByRed:   [...capturedByRed],
    capturedByBlack: [...capturedByBlack],
    lastMove:        lastMove ? { from: { ...lastMove.from }, to: { ...lastMove.to } } : null,
    clockRed,
    clockBlack,
  };
}

function restoreSnapshot(snap) {
  board           = snap.board;
  currentPlayer   = snap.currentPlayer;
  capturedByRed   = snap.capturedByRed;
  capturedByBlack = snap.capturedByBlack;
  lastMove        = snap.lastMove;
  if (settings.clockEnabled) {
    clockRed   = snap.clockRed;
    clockBlack = snap.clockBlack;
  }
}

function updateUndoBtn() {
  const btn = document.getElementById('undo-btn');
  if (!btn) return;
  btn.style.display = settings.undoEnabled ? '' : 'none';
  if (!settings.undoEnabled) return;
  const available = !gameOver && !!lastSnapshot && !undoUsedThisRound;
  btn.disabled = !available;
  const undoTarget = currentPlayer === 'red' ? 'black' : 'red';
  btn.className   = available ? `undo-${undoTarget}` : '';
  btn.title       = available ? T('undo_tip', undoTarget) : T('undo_tip_used');
  btn.textContent = available ? T(`undo_${undoTarget}`) : T('undo_label');
}

// ═══════════════════════════════════════════════
//   CLOCK HELPERS
// ═══════════════════════════════════════════════
function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function renderClock() {
  const panel = document.getElementById('clock-panel');
  if (!settings.clockEnabled) { panel.classList.add('hidden'); return; }
  panel.classList.remove('hidden');

  const redBox    = document.getElementById('clock-box-red');
  const blackBox  = document.getElementById('clock-box-black');
  const redTime   = document.getElementById('clock-red-time');
  const blackTime = document.getElementById('clock-black-time');

  redTime.textContent   = formatTime(clockRed);
  blackTime.textContent = formatTime(clockBlack);

  redBox.classList.toggle('active',   !gameOver && currentPlayer === 'red');
  blackBox.classList.toggle('active', !gameOver && currentPlayer === 'black');

  redTime.classList.toggle('urgent',   clockRed   <= 30);
  blackTime.classList.toggle('urgent', clockBlack <= 30);
}

function stopClock() {
  if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
}

function startClock() {
  if (!settings.clockEnabled || gameOver) return;
  stopClock();
  clockInterval = setInterval(() => {
    if (currentPlayer === 'red') {
      clockRed--;
      if (clockRed <= 0) {
        clockRed = 0;
        renderClock();
        stopClock();
        endGame('black', T('reason_timeout', 'red'));
        return;
      }
    } else {
      clockBlack--;
      if (clockBlack <= 0) {
        clockBlack = 0;
        renderClock();
        stopClock();
        endGame('red', T('reason_timeout', 'black'));
        return;
      }
    }
    renderClock();
  }, 1000);
}

function resetClocks() {
  clockRed   = settings.clockMinutes * 60;
  clockBlack = settings.clockMinutes * 60;
}

function initGame() {
  board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  currentPlayer = 'red';
  selectedCell  = null;
  validMoves    = [];
  gameOver      = false;
  capturedByRed   = [];
  capturedByBlack = [];
  lastMove        = null;
  lastSnapshot      = null;
  undoUsedThisRound = false;
  postUndoMove      = false;
  stopClock();
  resetClocks();
  stopAnim();
  for (const [c, r, player, type] of INIT_POS) {
    board[r][c] = { player, type };
  }
  document.getElementById('win-overlay').classList.add('hidden');
  updateUI();
  updateUndoBtn();
  updateResignBtn();
  renderClock();
  if (settings.clockEnabled) startClock();
}

// ═══════════════════════════════════════════════
//   TERRAIN HELPERS
// ═══════════════════════════════════════════════
function inBounds(c, r) { return c >= 0 && c < COLS && r >= 0 && r < ROWS; }
function isWater(c, r)  { return TERRAIN[r][c] === WATER; }

// Which player owns this den (null if not a den)
function denOwner(c, r) {
  const t = TERRAIN[r][c];
  if (t === DEN_T) return 'black';
  if (t === DEN_B) return 'red';
  return null;
}

// Effective rank for capture purposes (trap reduces opponent to 0)
function effectiveRank(piece, c, r) {
  const t = TERRAIN[r][c];
  if (t === TRAP_T && piece.player === 'red')   return 0;
  if (t === TRAP_B && piece.player === 'black')  return 0;
  return PIECE_DEF[piece.type].rank;
}

// ═══════════════════════════════════════════════
//   LION / TIGER RIVER JUMP
// ═══════════════════════════════════════════════
// Returns landing {col,row} or null if jump is blocked / impossible.
function getJumpDest(col, row, dc, dr) {
  // Immediate neighbour must be water to initiate a jump
  const fc = col + dc, fr = row + dr;
  if (!inBounds(fc, fr) || !isWater(fc, fr)) return null;

  let c = fc, r = fr;
  while (inBounds(c, r) && isWater(c, r)) {
    if (board[r][c] !== null) return null; // Any piece in water blocks the jump
    c += dc;
    r += dr;
  }
  if (!inBounds(c, r)) return null;
  return { col: c, row: r };
}

// ═══════════════════════════════════════════════
//   CAPTURE LEGALITY
// ═══════════════════════════════════════════════
function canCapture(attacker, ac, ar, defender, dc, dr) {
  const atkInWater = isWater(ac, ar);
  const defInWater = isWater(dc, dr);

  // A piece on land cannot reach a piece that is in water
  // (this is enforced by movement rules, but guard here for safety)
  if (defInWater && !atkInWater) return false;

  const defRank = effectiveRank(defender, dc, dr);
  // Trap reduces defender to rank 0 → any attacker can capture it
  if (defRank === 0) return true;

  // ── Rat ↔ Elephant special cases ──
  if (attacker.type === 'rat' && defender.type === 'elephant') {
    // Rat in water cannot capture Elephant on land
    if (atkInWater && !defInWater) return false;
    return true; // Rat beats Elephant (land-to-land or both-land)
  }
  if (attacker.type === 'elephant' && defender.type === 'rat') {
    return false; // Elephant never captures Rat
  }

  return effectiveRank(attacker, ac, ar) >= defRank;
}

// ═══════════════════════════════════════════════
//   VALID MOVE GENERATION
// ═══════════════════════════════════════════════
const DIRS = [[0, -1], [0, 1], [-1, 0], [1, 0]];

function getValidMoves(col, row) {
  const piece = board[row][col];
  if (!piece) return [];
  const moves = [];

  for (const [dc, dr] of DIRS) {
    const nc = col + dc, nr = row + dr;
    if (!inBounds(nc, nr)) continue;

    const terrain = TERRAIN[nr][nc];

    if (terrain === WATER) {
      // ── Moving INTO a water cell ──
      if (piece.type === 'rat') {
        // Rat can enter and swim in water
        const target = board[nr][nc];
        if (!target) {
          moves.push({ col: nc, row: nr });
        } else if (target.player !== piece.player) {
          // In water, Rat may only fight another Rat
          if (target.type === 'rat') {
            moves.push({ col: nc, row: nr });
          }
        }
      } else if (piece.type === 'lion' || piece.type === 'tiger') {
        // Lion / Tiger can jump over the entire river
        const dest = getJumpDest(col, row, dc, dr);
        if (dest) {
          const target = board[dest.row][dest.col];
          if (!target) {
            moves.push(dest);
          } else if (target.player !== piece.player &&
                     canCapture(piece, col, row, target, dest.col, dest.row)) {
            moves.push(dest);
          }
        }
      }
      // Other land pieces cannot enter water → no move added

    } else {
      // ── Moving INTO a land / trap / den cell ──

      // A piece cannot enter its OWN den
      const own = denOwner(nc, nr);
      if (own === piece.player) continue;

      const target = board[nr][nc];
      if (!target) {
        moves.push({ col: nc, row: nr });
      } else if (target.player !== piece.player &&
                 canCapture(piece, col, row, target, nc, nr)) {
        moves.push({ col: nc, row: nr });
      }
    }
  }
  return moves;
}

// ═══════════════════════════════════════════════
//   EXECUTE MOVE
// ═══════════════════════════════════════════════
function executeMove(fromCol, fromRow, toCol, toRow) {
  const piece  = board[fromRow][fromCol];
  const target = board[toRow][toCol];

  if (target) {
    if (piece.player === 'red')   capturedByRed.push(target.type);
    else                          capturedByBlack.push(target.type);
  }

  board[toRow][toCol]     = piece;
  board[fromRow][fromCol] = null;
  lastMove = { from: { col: fromCol, row: fromRow }, to: { col: toCol, row: toRow } };

  // ── Win: entered opponent's den ──
  const den = denOwner(toCol, toRow);
  if (den && den !== piece.player) {
    finishMove();
    endGame(piece.player, T('reason_den'));
    return;
  }

  // ── Win: opponent has no pieces left ──
  const opp = piece.player === 'red' ? 'black' : 'red';
  let oppAlive = false;
  outer: for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c] && board[r][c].player === opp) { oppAlive = true; break outer; }
    }
  }
  if (!oppAlive) {
    finishMove();
    endGame(piece.player, T('reason_captures'));
    return;
  }

  currentPlayer = opp;
  // Apply Fischer increment to the player who just completed their move
  if (settings.clockEnabled && settings.clockIncrement > 0) {
    if (piece.player === 'red') clockRed   += settings.clockIncrement;
    else                        clockBlack += settings.clockIncrement;
  }
  // Undo-round bookkeeping: if this was the recovery move after an undo,
  // don't reset undoUsedThisRound yet — wait for the opponent's move.
  if (postUndoMove) {
    postUndoMove = false;
  } else {
    undoUsedThisRound = false;
  }
  finishMove();
}

function finishMove() {
  selectedCell = null;
  validMoves   = [];
  stopAnim();
  if (settings.clockEnabled && !gameOver) { stopClock(); startClock(); }
  updateUI();
  updateUndoBtn();
  renderClock();
  render();
}

// ═══════════════════════════════════════════════
//   END GAME
// ═══════════════════════════════════════════════
function endGame(winner, reason) {
  gameOver = true;
  selectedCell = null;
  validMoves   = [];
  stopClock();
  updateUndoBtn();
  updateResignBtn();
  renderClock();
  render();

  const overlay = document.getElementById('win-overlay');
  const msg     = document.getElementById('win-message');
  const rsn     = document.getElementById('win-reason');
  msg.textContent = T('win', winner);
  msg.className   = winner;
  rsn.textContent = reason;
  overlay.classList.remove('hidden');
}

// ═══════════════════════════════════════════════
//   UI UPDATE
// ═══════════════════════════════════════════════
function updateUI() {
  const ti = document.getElementById('turn-indicator');
  if (currentPlayer === 'red') {
    ti.textContent = T('turn_red');
    ti.className   = 'red';
  } else {
    ti.textContent = T('turn_black');
    ti.className   = 'black';
  }
  document.getElementById('status-msg').textContent = '';

  const fmt = list => list.length
    ? list.map(t => pieceName(t)).join(' ')
    : '—';
  document.getElementById('red-cap').textContent   = fmt(capturedByRed);
  document.getElementById('black-cap').textContent = fmt(capturedByBlack);
}

// ═══════════════════════════════════════════════
//   IMAGES & CANVAS SETUP
// ═══════════════════════════════════════════════
const canvas = document.getElementById('board');
const ctx    = canvas.getContext('2d');

// Grid layout — calibrated for chessboard.png (912 × 1167)
const IMG_W  = 912;
const IMG_H  = 1167;
const BOARD_X = 3;
const BOARD_Y = 9;
const CELL_W  = (IMG_W - 2 * BOARD_X) / COLS;   // ≈ 129.4 px
const CELL_H  = (IMG_H - 2 * BOARD_Y) / ROWS;   // ≈ 127.7 px

function cellCenter(c, r) {
  return {
    x: BOARD_X + (c + 0.5) * CELL_W,
    y: BOARD_Y + (r + 0.5) * CELL_H,
  };
}

const boardImg = new Image();

// Load all 16 individual piece PNGs (pre-cut circles from assets/)
const PIECE_IMGS = {};
const ANIMALS     = ['elephant','tiger','cat','wolf','dog','rat','leopard','lion'];
const PLAYERS_LIST = ['red','black'];
let imagesLoaded = 0;
const TOTAL_IMAGES = 1 + ANIMALS.length * PLAYERS_LIST.length; // 1 board + 16 pieces

function onImageLoad() {
  if (++imagesLoaded < TOTAL_IMAGES) return;
  canvas.width  = IMG_W;
  canvas.height = IMG_H;
  // Draw a blank board while the setup overlay is shown
  ctx.drawImage(boardImg, 0, 0);
  // Unlock the start button
  imagesReady = true;
  const btn = document.getElementById('start-game-btn');
  btn.disabled    = false;
  btn.textContent = T('setup_start');
}

boardImg.onload  = onImageLoad;
boardImg.onerror = () => console.error('Failed to load chessboard.png');
boardImg.src     = 'assets/chessboard.png';

for (const player of PLAYERS_LIST) {
  for (const animal of ANIMALS) {
    const img = new Image();
    img.onload  = onImageLoad;
    img.onerror = () => console.error(`Failed to load piece: ${player}_${animal}`);
    img.src     = `assets/piece_${player}_${animal}.png`;
    PIECE_IMGS[`${player}_${animal}`] = img;
  }
}

// ═══════════════════════════════════════════════
//   RENDERING
// ═══════════════════════════════════════════════
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 1. Board background
  ctx.drawImage(boardImg, 0, 0);

  // 2. Last-move indicator (subtle tint)
  if (lastMove) {
    for (const cell of [lastMove.from, lastMove.to]) {
      const { x, y } = cellCenter(cell.col, cell.row);
      ctx.beginPath();
      ctx.arc(x, y, CELL_W * 0.44, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 200, 0, 0.18)';
      ctx.fill();
    }
  }

  // 3. Valid-move highlights
  const pulse = 0.5 + 0.5 * Math.sin(animPhase * Math.PI * 2); // 0 → 1
  for (const { col, row } of validMoves) {
    const { x, y } = cellCenter(col, row);
    const target   = board[row][col];

    if (target) {
      // ── Pulsing red glow for capturable pieces ──
      // Outer halo
      const haloR = CELL_W * (0.44 + 0.06 * pulse);
      const grad  = ctx.createRadialGradient(x, y, CELL_W * 0.20, x, y, haloR);
      grad.addColorStop(0, `rgba(255, 40, 0, ${0.55 + 0.30 * pulse})`);
      grad.addColorStop(1, 'rgba(255, 40, 0, 0)');
      ctx.beginPath();
      ctx.arc(x, y, haloR, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      // Sharp ring
      ctx.beginPath();
      ctx.arc(x, y, CELL_W * 0.43, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255, 60, 0, ${0.70 + 0.30 * pulse})`;
      ctx.lineWidth   = 3 + 3 * pulse;
      ctx.stroke();
    } else {
      // Green dot for empty destinations
      ctx.beginPath();
      ctx.arc(x, y, CELL_W * 0.16, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(50, 210, 70, 0.80)';
      ctx.fill();
    }
  }

  // 4. Selected-piece ring
  if (selectedCell) {
    const { x, y } = cellCenter(selectedCell.col, selectedCell.row);
    ctx.beginPath();
    ctx.arc(x, y, CELL_W * 0.47, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255, 230, 0, 0.92)';
    ctx.lineWidth   = 6;
    ctx.stroke();
  }

  // 5. Draw all pieces — each is a pre-cut circle PNG, draw centred in cell
  const clipR = Math.min(CELL_W, CELL_H) * 0.44;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const piece = board[r][c];
      if (!piece) continue;

      const { x, y } = cellCenter(c, r);
      const img = PIECE_IMGS[`${piece.player}_${piece.type}`];
      if (!img) continue;

      const drawSize = clipR * 2;
      ctx.drawImage(img, x - clipR, y - clipR, drawSize, drawSize);
    }
  }
}

// ═══════════════════════════════════════════════
//   ANIMATION LOOP
// ═══════════════════════════════════════════════
function startAnim() {
  if (animFrame) return; // already running
  function loop() {
    animPhase = (performance.now() / 800) % 1; // one pulse per 800 ms
    render();
    animFrame = requestAnimationFrame(loop);
  }
  animFrame = requestAnimationFrame(loop);
}

function stopAnim() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
}

// ═══════════════════════════════════════════════
//   CLICK HANDLING
// ═══════════════════════════════════════════════
canvas.addEventListener('click', (e) => {
  if (gameOver) return;

  const rect   = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;   // map CSS pixels → canvas pixels
  const scaleY = canvas.height / rect.height;
  const x      = (e.clientX - rect.left) * scaleX;
  const y      = (e.clientY - rect.top)  * scaleY;

  const col = Math.floor((x - BOARD_X) / CELL_W);
  const row = Math.floor((y - BOARD_Y) / CELL_H);

  if (!inBounds(col, row)) { deselect(); return; }
  handleCellClick(col, row);
});

function handleCellClick(col, row) {
  // Is this a valid move/capture destination?
  const isValidDest = validMoves.some(m => m.col === col && m.row === row);
  if (isValidDest && selectedCell) {
    lastSnapshot = saveSnapshot();
    executeMove(selectedCell.col, selectedCell.row, col, row);
    return;
  }

  // Click on own piece → select / reselect
  const piece = board[row][col];
  if (piece && piece.player === currentPlayer) {
    selectedCell = { col, row };
    validMoves   = getValidMoves(col, row);
    const status  = document.getElementById('status-msg');
    status.textContent = validMoves.length === 0
      ? T('no_moves', pieceName(piece.type))
      : '';
    // Animate if any valid move is a capture
    const hasCapture = validMoves.some(m => board[m.row][m.col] !== null);
    if (hasCapture) { startAnim(); } else { stopAnim(); render(); }
    return;
  }

  // Anything else → deselect
  deselect();
}

function deselect() {
  selectedCell = null;
  validMoves   = [];
  stopAnim();
  document.getElementById('status-msg').textContent = '';
  render();
}

// ═══════════════════════════════════════════════
//   SETUP OVERLAY
// ═══════════════════════════════════════════════

// Populate the clock-minutes select (1–15, default 10)
(function populateClockSelects() {
  const sel = document.getElementById('s-clock-mins');
  for (let i = 1; i <= 15; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = i;
    if (i === 10) opt.selected = true;
    sel.appendChild(opt);
  }
  // Populate increment select: 0, 2, 3, 5, 10, 15, 20, 30 seconds (Fischer clock)
  const inc = document.getElementById('s-clock-inc');
  for (const s of [0, 2, 3, 5, 10, 15, 20, 30]) {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    inc.appendChild(opt);
  }
})();

document.getElementById('s-clock').addEventListener('change', function () {
  document.getElementById('s-clock-mins').disabled = !this.checked;
  document.getElementById('s-clock-inc').disabled  = !this.checked;
});

function openSetupOverlay() {
  // Pre-fill with last used settings
  document.getElementById('s-undo').checked  = settings.undoEnabled;
  document.getElementById('s-clock').checked = settings.clockEnabled;
  document.getElementById('s-clock-mins').disabled = !settings.clockEnabled;
  document.getElementById('s-clock-mins').value    = settings.clockMinutes;
  document.getElementById('s-clock-inc').disabled  = !settings.clockEnabled;
  document.getElementById('s-clock-inc').value     = settings.clockIncrement;
  document.getElementById('setup-overlay').classList.remove('hidden');
}

document.getElementById('start-game-btn').addEventListener('click', () => {
  if (!imagesReady) return;
  settings.undoEnabled    = document.getElementById('s-undo').checked;
  settings.clockEnabled   = document.getElementById('s-clock').checked;
  settings.clockMinutes   = parseInt(document.getElementById('s-clock-mins').value, 10);
  settings.clockIncrement = parseInt(document.getElementById('s-clock-inc').value,  10);
  document.getElementById('setup-overlay').classList.add('hidden');
  gameOver = false;
  initGame();
  render();
});

// ═══════════════════════════════════════════════
//   BUTTONS
// ═══════════════════════════════════════════════
function updateResignBtn() {
  const btn = document.getElementById('resign-btn');
  if (btn) btn.disabled = gameOver;
}

document.getElementById('new-game-btn').addEventListener('click', () => {
  stopClock();
  document.getElementById('resign-overlay').classList.add('hidden');
  openSetupOverlay();
});

document.getElementById('restart-btn').addEventListener('click', () => {
  stopClock();
  document.getElementById('resign-overlay').classList.add('hidden');
  openSetupOverlay();
});

document.getElementById('resign-btn').addEventListener('click', () => {
  if (gameOver) return;
  stopClock();
  document.getElementById('resign-prompt').textContent = T('resign_prompt', currentPlayer);
  document.getElementById('resign-overlay').classList.remove('hidden');
});

document.getElementById('resign-confirm-btn').addEventListener('click', () => {
  document.getElementById('resign-overlay').classList.add('hidden');
  const loser  = currentPlayer;
  const winner = loser === 'red' ? 'black' : 'red';
  endGame(winner, T('reason_resign', loser));
});

document.getElementById('resign-cancel-btn').addEventListener('click', () => {
  document.getElementById('resign-overlay').classList.add('hidden');
  if (settings.clockEnabled && !gameOver) startClock();
});

document.getElementById('undo-btn').addEventListener('click', () => {
  if (gameOver || !lastSnapshot || undoUsedThisRound) return;
  stopClock();
  restoreSnapshot(lastSnapshot);
  lastSnapshot      = null;
  undoUsedThisRound = true;
  postUndoMove      = true;
  selectedCell = null;
  validMoves   = [];
  stopAnim();
  updateUI();
  updateUndoBtn();
  renderClock();
  if (settings.clockEnabled) startClock();
  render();
});

document.getElementById('rules-open-btn').addEventListener('click', () => {
  document.getElementById('rules-overlay').classList.remove('hidden');
});

document.getElementById('rules-overlay').addEventListener('click', (e) => {
  if (e.target.id === 'rules-back-btn')
    document.getElementById('rules-overlay').classList.add('hidden');
});

document.getElementById('lang-btn').addEventListener('click', () => {
  lang = lang === 'zh' ? 'en' : 'zh';
  applyLang();
});

applyLang();
</script>
</body>
</html>
